<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظتي V3 — موقع الويب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent);
        }
        .hero h1 { font-size: 4.5rem; font-weight: 800; line-height: 1; margin-bottom: 2rem; color: white; }
        .hero p { font-size: 1.4rem; max-width: 700px; margin: 0 auto 3rem; color: var(--text-body); }
        
        .floating-cards {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            z-index: -1;
            overflow: hidden;
        }
        .f-card {
            position: absolute;
            width: 300px;
            height: 180px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: float 10s infinite alternate ease-in-out;
        }
        @keyframes float {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-40px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="floating-cards">
        <div class="f-card" style="top: 15%; right: 10%; animation-delay: 0s;"></div>
        <div class="f-card" style="bottom: 20%; left: 5%; animation-delay: 2s; width: 250px;"></div>
        <div class="f-card" style="top: 40%; left: 15%; animation-delay: 1s; width: 200px;"></div>
    </div>

    <section class="hero">
        <div class="container" style="padding: 0 5%;">
            <div style="background: rgba(59, 130, 246, 0.1); padding: 0.5rem 1.5rem; border-radius: 50px; display: inline-block; margin-bottom: 2rem; border: 1px solid var(--primary);">
                <span style="color: var(--primary); font-weight: 800;">نسخة الويب المستقلة V3.0</span>
            </div>
            <h1>إدارتك المالية بصورة<br><span style="color: var(--primary);">أذكى، أسرع، وأجمل.</span></h1>
            <p>لا مزيد من التعقيد. جرب تطبيق الويب الذي يمنحك القوة الكاملة للتحكم في مصروفاتك، قروضك، وجمعياتك المالية بلمسة واحدة.</p>
            
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <a href="app.html" class="btn btn-primary" style="padding: 1.5rem 3rem; font-size: 1.2rem;">
                    دخول التطبيق الآن <i class="bi bi-arrow-left"></i>
                </a>
                <a href="#" class="btn btn-ghost" style="padding: 1.5rem 3rem; font-size: 1.2rem;">شرح المميزات</a>
            </div>
        </div>
    </section>

</body>
</html>
